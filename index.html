<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Registration Form </title>
    </head>
    <body>
        <div class="container">
        <h1> Registration Form </h1>
        <form>

            <label for="fullname">Full Name <span class="required">*</span></label>
            <div class="input-box">
                <i class="fa-solid fa-user"></i> 
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" pattern="[A-Za-z ]+" title="Only letters and spaces are allowed" required>
            </div>


            <label for="email">Email <span class="required">*</span></label>
            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>


            <label for="password">Password <span class="required">*</span></label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Create a password" minlength="6" title="Password must be at least 6 characters" required>
            </div>


            <label>Gender <span class="required">*</span></label>

            <div class="gender">
            <input type="radio" id="male" name="gender" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender">
            <label for="other">Other</label>
            </div>


            <label for="course">Course/Interest <span class="required">*</span></label>
            <select id="course" name="course" required>
                <option value="">---Select Course---</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
                <option value="cpp">C++</option>
                <option value="python">Python</option>
            </select>


            <input type="submit" value="Register Now">

        </form>
        </div>
    </body>
    </html>
