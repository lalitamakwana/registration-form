<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Registration Form </title>
    </head>
    <body>
        <div class="circle one"></div>
        <div class="circle two"></div>
        <div class="circle three"></div>
        <div class="container">
        <div class="top-icon">
    <i class="fa-solid fa-user-plus"></i>
</div>

<h1>Registration Form</h1>

<p class="subtitle">
    Create your account to continue.
</p>
        <form>
            
            <!-- 1.Full name -->

            <label for="fullname">Full Name <span class="required">*</span></label>
            <div class="input-box">
                <i class="fa-solid fa-user"></i> 
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" pattern="[A-Za-z ]+" title="Only letters and spaces are allowed" required>
            </div>
            
            <!-- 2.Email -->

            <label for="email">Email <span class="required">*</span></label>
            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- 3.Password -->

            <label for="password">Password <span class="required">*</span></label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Create a password" minlength="6" title="Password must be at least 6 characters" required>
            </div>

            <!-- 4.Gender -->

            <label>Gender <span class="required">*</span></label>

            <div class="gender">
            <input type="radio" id="male" name="gender" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender">
            <label for="other">Other</label>
            </div>

            <!-- 5.Mobile Number -->
         
            <label for="mobile">Mobile Number <span class="required">*</span></label>
            <div class="input-box">
                  <i class="fa-solid fa-phone input-icon"></i>
            <input type="tel" id="mobile" name="mobile" maxlength="10"
                   inputmode="numeric" placeholder="Enter your mobile number">
            </div>
            <small class="error-msg" data-testid="error-mobile"></small>

            <!-- 6.Course/Interest -->

            <label for="course">Course/Interest <span class="required">*</span></label>
            <div class="input-box">
                <i class="fa-solid fa-graduation-cap"></i>
            <select id="course" name="course" required>
                <option value="">Select Course</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
                <option value="cpp">C++</option>
                <option value="python">Python</option>
            </select>
            </div>


            <input type="submit" value="Register Now">

        </form>
        </div>
    </body>
    </html>
